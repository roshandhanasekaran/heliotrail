      - generic [ref=e3996]:
        - generic [ref=e3997] [cursor=pointer]:
          - generic [ref=e3998]:
            - generic [ref=e3999]: What types of data does Datashake collect?
            - img [ref=e4002]
          - generic [ref=e4005]: Everything publicly available, with the depth your use case needs. Social posts, reviews, forums, news, and e-commerce data from 150+ sources. Complete threads, engagement metrics, 5+ years of history. All normalized and analysis-ready.
        - generic [ref=e4006] [cursor=pointer]:
          - generic [ref=e4007]:
            - generic [ref=e4008]: How is Datashake different from other social listening tools?
            - img [ref=e4011]
          - generic [ref=e4014]: We're infrastructure, not an end-user platform. You get the raw data layer (150+ sources vs. typical 20-30) with deeper coverage, faster access, and no per-seat fees. We replace multiple vendor relationships with one reliable integration that powers your products and analytics.
        - generic [ref=e4015] [cursor=pointer]:
          - generic [ref=e4016]:
            - generic [ref=e4017]: Can Datashake access private social media content?
            - img [ref=e4020]
          - generic [ref=e4023]: No, we only collect publicly available data accessible without login.
        - generic [ref=e4024] [cursor=pointer]:
          - generic [ref=e4025]:
            - generic [ref=e4026]: How quickly can I access historical data?
            - img [ref=e4029]
          - generic [ref=e4032]: Instantly. Our archive search returns 5+ years of historical data in seconds with no advance setup required. If a topic becomes relevant today, you can analyze years of conversation history immediately, plus capture real-time discussions as they unfold.
        - generic [ref=e4033] [cursor=pointer]:
          - generic [ref=e4034]:
            - generic [ref=e4035]: What sources does Datashake cover?
            - img [ref=e4038]
          - generic [ref=e4041]: Major social platforms, 100+ review sites, news outlets, forums, and e-commerce channels. Multi-language with global coverage. We add new sources based on customer needs and make them automatically available to everyone.
        - generic [ref=e4042] [cursor=pointer]:
          - generic [ref=e4043]:
            - generic [ref=e4044]: How does pricing work?
            - img [ref=e4047]
          - generic [ref=e4050]: We use a credit-based model where you pay only for data consumed. Your per-mention cost decreases automatically as volume grows, with no per-seat fees. Get in touch for a custom proposal.
        - generic [ref=e4051] [cursor=pointer]:
          - generic [ref=e4052]:
            - generic [ref=e4053]: Do I need technical expertise to use Datashake?
            - img [ref=e4056]
          - generic [ref=e4059]: Yes. Datashake is designed for technical teams building data products or analytics workflows, with integration via API, webhooks, or direct feeds. We're not a dashboard tool, but we do provide ready-made templates if you're building visualizations on top of our data.
        - generic [ref=e4060] [cursor=pointer]:
          - generic [ref=e4061]:
            - generic [ref=e4062]: Can Datashake handle enterprise-scale needs?
            - img [ref=e4065]
          - generic [ref=e4068]: Absolutely. We're built to handle hundreds of millions of daily fetches with 98.3% uptime, dedicated support, custom SLAs, and compliance-ready infrastructure. Enterprise customers rely on us to power mission-critical workflows across global markets.
        - generic [ref=e4069] [cursor=pointer]:
          - generic [ref=e4070]:
            - generic [ref=e4071]: What if you don't cover a source I need?
            - img [ref=e4074]
          - generic [ref=e4077]: Just tell us. We regularly add sources based on customer requests and make them available to all customers automatically, with no re-engineering required and no extra costs. Many of our current sources exist because customers asked for them.
